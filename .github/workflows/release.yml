name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'foundry-tracing-foundations-v*.*.*'
      - 'x-reason-node-v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      # Determine which package to release based on tag
      - name: Determine package
        id: package
        run: |
          if [[ "${{ github.ref }}" == refs/tags/foundry-tracing-foundations-v* ]]; then
            echo "dir=foundry-tracing-foundations" >> $GITHUB_OUTPUT
            echo "name=foundry-tracing-foundations" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/x-reason-node-v* ]]; then
            echo "dir=x-reason-node" >> $GITHUB_OUTPUT
            echo "name=x-reason-node" >> $GITHUB_OUTPUT
          else
            echo "Unknown tag pattern"
            exit 1
          fi
      
      # Build and test
      - name: Install dependencies
        working-directory: ${{ steps.package.outputs.dir }}
        run: npm ci
      
      - name: Run tests
        working-directory: ${{ steps.package.outputs.dir }}
        run: npm test
      
      - name: Build
        working-directory: ${{ steps.package.outputs.dir }}
        run: npm run build:npm
      
      # Publish to npm (commented out - not package owner)
      # - name: Publish to npm
      #   working-directory: ${{ steps.package.outputs.dir }}
      #   run: npm publish --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      # Create GitHub Release with assets
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.package.outputs.dir }}/dist/**
            ${{ steps.package.outputs.dir }}/README.md
            ${{ steps.package.outputs.dir }}/LICENSE
          generate_release_notes: true
          name: ${{ steps.package.outputs.name }} ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}